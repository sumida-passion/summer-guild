name: Generate Project Map

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/GPT_PROJECT_STATE.md"
      - "docs/PROJECT_STATE.json"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-project-map-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-project-map:
    name: Generate Project State
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: false

      - name: Generate project state files
        run: node tools/generateProjectState.js

      - name: Check generated changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- docs/GPT_PROJECT_STATE.md docs/PROJECT_STATE.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Project state files are already up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Project state files have changed."
          fi

      - name: Commit generated project state
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/GPT_PROJECT_STATE.md docs/PROJECT_STATE.json
          git commit -m "Update generated project state"
          git push

      - name: Finish without changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "No generated files needed updating."
