name: Generate Project Index

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "project-index.json"

permissions:
  contents: write

jobs:
  generate-project-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create project-index.json
        shell: bash
        run: |
          python3 - <<'PYTHON'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path(".")
          ignored_parts = {
              ".git",
              "node_modules",
              "__pycache__",
          }

          files = []

          for path in sorted(root.rglob("*")):
              if not path.is_file():
                  continue

              relative = path.as_posix()

              if relative == "project-index.json":
                  continue

              if any(part in ignored_parts for part in path.parts):
                  continue

              files.append(relative)

          data = {
              "schemaVersion": 1,
              "project": "summer-guild",
              "generatedAtUtc": datetime.now(timezone.utc).isoformat(),
              "fileCount": len(files),
              "files": files,
              "newThreadPrompt": (
                  "夏休みギルドの開発を続けます。"
                  "まずproject-index.jsonを読み、"
                  "実際のファイル構成を確認してから作業してください。"
              )
          }

          Path("project-index.json").write_text(
              json.dumps(data, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8"
          )

          print("project-index.json を作成しました")
          print(f"ファイル数: {len(files)}")
          PYTHON

      - name: Commit project-index.json
        shell: bash
        run: |
          if [ ! -f project-index.json ]; then
            echo "project-index.json が作成されていません。"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add project-index.json

          if git diff --cached --quiet; then
            echo "project-index.json に変更はありません。"
            exit 0
          fi

          git commit -m "docs: update project index"
          git push
