name: Generate Project Index

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "project-index.json"

permissions:
  contents: write

jobs:
  generate-project-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate project-index.json
        shell: bash
        run: |
          python3 - <<'PYTHON'
          import hashlib
          import json
          import re
          import subprocess
          from collections import Counter
          from datetime import datetime, timezone
          from pathlib import Path

          ROOT = Path.cwd()
          OUTPUT = ROOT / "project-index.json"

          IGNORE_DIRS = {
              ".git",
              "node_modules",
              "__pycache__",
              ".idea",
              ".vscode",
          }

          IMAGE_EXTENSIONS = {
              ".png", ".jpg", ".jpeg", ".gif", ".webp", ".svg",
          }

          CODE_EXTENSIONS = {
              ".js", ".mjs", ".cjs", ".ts", ".tsx", ".jsx",
              ".html", ".css", ".py",
          }

          TEXT_EXTENSIONS = {
              ".js", ".mjs", ".cjs", ".ts", ".tsx", ".jsx",
              ".html", ".css", ".py", ".json", ".md", ".txt",
              ".yml", ".yaml", ".xml", ".csv",
          }

          def rel(path):
              return path.relative_to(ROOT).as_posix()

          def ignored(path):
              try:
                  parts = path.relative_to(ROOT).parts
              except ValueError:
                  return True
              return any(part in IGNORE_DIRS for part in parts)

          def safe_text(path):
              for encoding in ("utf-8", "utf-8-sig"):
                  try:
                      return path.read_text(encoding=encoding)
                  except UnicodeDecodeError:
                      continue
                  except OSError:
                      return ""
              return ""

          def sha1_short(path):
              digest = hashlib.sha1()
              try:
                  with path.open("rb") as file:
                      while True:
                          chunk = file.read(65536)
                          if not chunk:
                              break
                          digest.update(chunk)
                  return digest.hexdigest()[:10]
              except OSError:
                  return "unknown"

          def git_output(*args):
              try:
                  return subprocess.check_output(
                      ["git", *args],
                      cwd=ROOT,
                      text=True,
                      stderr=subprocess.DEVNULL,
                  ).strip()
              except Exception:
                  return ""

          def extract_js_api(text):
              functions = []
              functions += re.findall(
                  r"^\s*(?:async\s+)?function\s+([A-Za-z_$][\w$]*)\s*\(",
                  text,
                  re.MULTILINE,
              )
              functions += re.findall(
                  r"^\s*(?:const|let|var)\s+([A-Za-z_$][\w$]*)\s*=\s*(?:async\s*)?\([^)]*\)\s*=>",
                  text,
                  re.MULTILINE,
              )
              classes = re.findall(
                  r"^\s*class\s+([A-Za-z_$][\w$]*)",
                  text,
                  re.MULTILINE,
              )
              window_exports = re.findall(
                  r"window\.([A-Za-z_$][\w$]*)\s*=",
                  text,
              )

              def unique(values):
                  return list(dict.fromkeys(values))[:100]

              return {
                  "functions": unique(functions),
                  "classes": unique(classes),
                  "windowExports": unique(window_exports),
              }

          all_files = sorted(
              [
                  path
                  for path in ROOT.rglob("*")
                  if path.is_file()
                  and not ignored(path)
                  and rel(path) != "project-index.json"
              ],
              key=lambda path: rel(path).lower(),
          )

          extension_counts = Counter(
              path.suffix.lower() if path.suffix else "[no-extension]"
              for path in all_files
          )

          file_entries = []
          image_entries = []
          api_entries = []

          for path in all_files:
              suffix = path.suffix.lower()
              size = path.stat().st_size
              text = safe_text(path) if suffix in TEXT_EXTENSIONS else ""

              entry = {
                  "path": rel(path),
                  "extension": suffix or None,
                  "sizeBytes": size,
                  "sha1": sha1_short(path),
              }

              if text:
                  entry["lineCount"] = len(text.splitlines())

              file_entries.append(entry)

              if suffix in IMAGE_EXTENSIONS:
                  image_entries.append({
                      "path": rel(path),
                      "extension": suffix,
                      "sizeBytes": size,
                  })

              if suffix in {".js", ".mjs", ".cjs", ".ts", ".tsx", ".jsx"} and text:
                  api = extract_js_api(text)
                  if any(api.values()):
                      api_entries.append({
                          "path": rel(path),
                          **api,
                      })

          lower_paths = {}
          for entry in file_entries:
              lower_paths.setdefault(entry["path"].lower(), []).append(entry["path"])

          case_collisions = [
              paths
              for paths in lower_paths.values()
              if len(paths) > 1
          ]

          changed_files = []
          diff = git_output("diff", "--name-status", "HEAD^", "HEAD")
          if diff:
              for line in diff.splitlines():
                  parts = line.split("\t")
                  changed_files.append({
                      "status": parts[0],
                      "paths": parts[1:],
                  })

          project_index = {
              "schemaVersion": 1,
              "project": {
                  "name": "summer-guild",
                  "concept": (
                      "子どもの体験・努力・挑戦・継続を、"
                      "認定・思い出・世界の成長として可視化する。"
                  ),
                  "platform": [
                      "GitHub Pages",
                      "PWA",
                      "iPad Safari",
                      "Local Storage",
                  ],
                  "developmentRules": [
                      "既存APIを推測で書き換えない",
                      "改修前に対象ファイルと依存ファイルを読む",
                      "ファイル名と拡張子の大文字・小文字を厳密に守る",
                      "大きな完成JS・CSS・HTMLはZIPで渡す",
                      "動いている機能を守りながら一つずつ改修する",
                  ],
              },
              "generated": {
                  "atUtc": datetime.now(timezone.utc).isoformat(),
                  "commit": git_output("rev-parse", "--short", "HEAD") or "unknown",
                  "commitSubject": git_output("log", "-1", "--pretty=%s") or "unknown",
              },
              "summary": {
                  "fileCount": len(file_entries),
                  "imageCount": len(image_entries),
                  "apiFileCount": len(api_entries),
                  "totalBytes": sum(item["sizeBytes"] for item in file_entries),
                  "extensions": dict(sorted(extension_counts.items())),
              },
              "files": file_entries,
              "images": image_entries,
              "javascriptApi": api_entries,
              "warnings": {
                  "caseCollisions": case_collisions,
              },
              "latestCommitChanges": changed_files,
              "newThreadPrompt": (
                  "夏休みギルドの開発を続けます。"
                  "まずproject-index.jsonを読み、"
                  "既存API・実ファイル・大文字小文字を確認してください。"
                  "推測でコードを書かず、大きな完成ファイルはZIPで渡してください。"
              ),
          }

          OUTPUT.write_text(
              json.dumps(project_index, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          print(f"Generated: {OUTPUT}")
          print(f"Files indexed: {len(file_entries)}")
          PYTHON

      - name: Commit project-index.json
        shell: bash
        run: |
          if git diff --quiet -- project-index.json; then
            echo "project-index.json に変更はありません。"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add project-index.json
          git commit -m "docs: update project index"
          git push
