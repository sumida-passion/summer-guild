<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>夏休みギルド ～自分を定義する冒険～</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">

    <!-- PWA -->
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#2b1b12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="夏休みギルド">
</head>

<body>

    <!-- ========================= -->
    <!-- タイトル画面 -->
    <!-- ========================= -->

    <section id="title-screen" class="screen active">

        <div class="background title-background"></div>

        <div class="title-panel">

            <h1 id="gameTitle">夏休みギルド</h1>

            <p class="subtitle">
                ～ 自分を定義する冒険 ～
            </p>

            <button id="startButton">
                はじめる
            </button>

        </div>

    </section>



    <!-- ========================= -->
    <!-- 自分の部屋 -->
    <!-- ========================= -->

    <section id="room-screen" class="screen">

        <div class="background room-background"></div>

        <!-- 主人公 -->

        <div id="player">

            <img id="player-base"
                src="assets/characters/player/base/base.png">

            <img id="player-top"
                src="assets/characters/player/clothes/tops/default_tops.png">

            <img id="player-bottom"
                src="assets/characters/player/clothes/bottoms/default_bottoms.png">

        </div>

        <button id="gotoGuildHall">
            ギルドホールへ
        </button>

    </section>



    <!-- ========================= -->
    <!-- ギルドホール -->
    <!-- ========================= -->

    <section id="guildhall-screen" class="screen">

        <div class="background guildhall-background"></div>

        <button id="backRoom">
            部屋へ戻る
        </button>

    </section>



    <!-- ========================= -->
    <!-- Developer Mode（通常は非表示） -->
    <!-- ========================= -->

    <aside id="developerPanel">

        <h2>⚙ Developer Mode</h2>

        <div id="developerContent">

            準備中...

        </div>

    </aside>



    <!-- JavaScript -->

    <script src="js/app.js"></script>

</body>

</html>
