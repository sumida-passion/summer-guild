<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        夏休みギルド ～自分を定義する冒険～
    </title>


    <!-- ========================= -->
    <!-- CSS -->
    <!-- ========================= -->

    <link
        rel="stylesheet"
        href="css/common.css">

    <link
        rel="stylesheet"
        href="css/layout.css">

    <link
        rel="stylesheet"
        href="css/developer.css">


    <!-- ========================= -->
    <!-- PWA -->
    <!-- ========================= -->

    <link
        rel="manifest"
        href="manifest.webmanifest">

    <meta
        name="theme-color"
        content="#2b1b12">

    <meta
        name="apple-mobile-web-app-capable"
        content="yes">

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black-translucent">

    <meta
        name="apple-mobile-web-app-title"
        content="夏休みギルド">
</head>


<body>

    <!-- ========================= -->
    <!-- 横画面への案内 -->
    <!-- ========================= -->

    <div class="orientation-message">
        画面を横向きにして<br>
        夏休みギルドを開いてください
    </div>



    <!-- ========================= -->
    <!-- タイトル画面 -->
    <!-- ========================= -->

    <section
        id="title-screen"
        class="screen active"
        aria-hidden="false">

        <div
            class="background title-background">
        </div>


        <div class="title-panel">

            <h1
                id="gameTitle"
                tabindex="-1">
                夏休みギルド
            </h1>


            <p class="subtitle">
                ～ 自分を定義する冒険 ～
            </p>


            <button
                id="startButton"
                type="button">
                はじめる
            </button>

        </div>

    </section>



    <!-- ========================= -->
    <!-- 自分の部屋 -->
    <!-- ========================= -->

    <section
        id="room-screen"
        class="screen"
        aria-hidden="true">

        <div
            class="background room-background">
        </div>


        <div id="player">

            <img
                id="player-base"
                src="assets/characters/player/base/base.png"
                alt="主人公">


            <img
                id="player-bottom"
                src="assets/characters/player/clothes/bottoms/default_bottoms.png"
                alt="">


            <img
                id="player-top"
                src="assets/characters/player/clothes/tops/default_tops.png"
                alt="">

        </div>


        <button
            id="gotoGuildHall"
            type="button">
            ギルドホールへ
        </button>

    </section>



    <!-- ========================= -->
    <!-- ギルドホール -->
    <!-- ========================= -->

    <section
        id="guildhall-screen"
        class="screen"
        aria-hidden="true">

        <div
            class="background guildhall-background">
        </div>


        <div class="guildhall-menu">

            <button
                id="gotoQuestBoard"
                type="button">
                今日のクエスト
            </button>

        </div>


        <button
            id="backRoom"
            type="button">
            部屋へ戻る
        </button>

    </section>



    <!-- ========================= -->
    <!-- クエストボード -->
    <!-- ========================= -->

    <section
        id="questboard-screen"
        class="screen"
        aria-hidden="true">

        <div
            class="background guildhall-background">
        </div>


        <div class="questboard-window">

            <header class="questboard-header">

                <p class="questboard-label">
                    DAILY QUEST
                </p>

                <h2>
                    今日のクエスト
                </h2>

                <p
                    id="gpDisplay"
                    class="gp-display">
                    所持GP：0
                </p>

            </header>


            <div
                id="dailyQuestList"
                class="daily-quest-list">

                <p class="quest-loading">
                    クエストを確認しています……
                </p>

            </div>

        </div>


        <button
            id="backGuildHall"
            type="button">
            ギルドホールへ戻る
        </button>

    </section>



    <!-- ========================= -->
    <!-- クエスト実行画面 -->
    <!-- ========================= -->

    <section
        id="quest-screen"
        class="screen"
        aria-hidden="true">

        <div
            class="background quest-background">
        </div>


        <main
            id="questContainer"
            class="quest-container"
            aria-live="polite">
        </main>

    </section>



    <!-- ========================= -->
    <!-- クエスト結果画面 -->
    <!-- ========================= -->

    <section
        id="result-screen"
        class="screen"
        aria-hidden="true">

        <div
            class="background result-background">
        </div>


        <div class="result-window">

            <p class="result-label">
                QUEST COMPLETE
            </p>


            <h2 id="resultTitle">
                クエストクリア！
            </h2>


            <p
                id="resultMessage"
                class="result-message">
                最後まで取り組みました
            </p>


            <div class="reward-panel">

                <span class="reward-label">
                    獲得報酬
                </span>


                <strong id="rewardText">
                    10 GP
                </strong>

            </div>


            <p
                id="totalGpText"
                class="total-gp-text">
                所持GP：10
            </p>


            <button
                id="resultBackQuestBoard"
                type="button">
                クエストボードへ戻る
            </button>

        </div>

    </section>



    <!-- ========================= -->
    <!-- Developer Mode -->
    <!-- ========================= -->

    <aside
        id="developerPanel"
        hidden
        aria-hidden="true">
    </aside>



    <!-- ========================= -->
    <!-- JavaScript -->
    <!-- 読み込み順が重要 -->
    <!-- ========================= -->

    <script src="js/settings.js"></script>

    <script src="js/systems/questEngine.js"></script>

    <script src="js/quests/daily.js"></script>

    <script src="js/quests/hyakumasu.js"></script>

    <script src="js/developer.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
