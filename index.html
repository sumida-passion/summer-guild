<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        勉強ギルド ～自分を定義する冒険～
    </title>


    <!-- ========================= -->
    <!-- CSS -->
    <!-- ========================= -->

    <link
        rel="stylesheet"
        href="css/common.css?v=20260721-1">

    <link
        rel="stylesheet"
        href="css/layout.css?v=20260722-2">

    <link
        rel="stylesheet"
        href="css/developer.css?v=20260721-1">


    <!-- ========================= -->
    <!-- PWA -->
    <!-- ========================= -->

    <link
        rel="manifest"
        href="manifest.webmanifest?v=20260721-1">

    <link
        rel="apple-touch-icon"
        href="assets/app-icons/apple-touch-icon.png">

    <meta
        name="theme-color"
        content="#2b1b12">

    <meta
        name="apple-mobile-web-app-capable"
        content="yes">

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black-translucent">

    <meta
        name="apple-mobile-web-app-title"
        content="勉強ギルド">
</head>


<body>

    <!-- ========================= -->
    <!-- 横画面への案内 -->
    <!-- ========================= -->

    <div class="orientation-message">
        画面を横向きにして<br>
        勉強ギルドを開いてください
    </div>



    <!-- ========================= -->
    <!-- タイトル画面 -->
    <!-- ========================= -->

    <section
        id="title-screen"
        class="screen active"
        aria-hidden="false">

        <div
            class="background title-background">
        </div>


        <div class="title-panel">

            <h1
                id="gameTitle"
                tabindex="-1">
                勉強ギルド
            </h1>


            <p class="subtitle">
                ～ 自分を定義する冒険 ～
            </p>


            <button
                id="startButton"
                type="button">
                はじめる
            </button>


            <div class="app-update-area">
                <button
                    id="checkUpdateButton"
                    class="app-update-button"
                    type="button">
                    最新版を確認
                </button>

                <p
                    id="updateStatusText"
                    class="app-update-status"
                    aria-live="polite">
                </p>
            </div>

        </div>

    </section>



    <!-- ========================= -->
    <!-- 自分の部屋 -->
    <!-- ========================= -->

    <section
        id="room-screen"
        class="screen"
        aria-hidden="true">

        <div
            class="background room-background">
        </div>


        <div id="player">

            <img
                id="player-capes"
                data-player-layer="capes"
                alt=""
                hidden>


            <img
                id="player-base"
                src="assets/characters/player/base/base.png"
                alt="主人公">


            <img
                id="player-bottom"
                data-player-layer="bottoms"
                src="assets/characters/player/clothes/bottoms/default_bottoms.png"
                alt="">


            <img
                id="player-top"
                data-player-layer="tops"
                src="assets/characters/player/clothes/tops/default_tops.png"
                alt="">


            <img
                id="player-shoes"
                data-player-layer="shoes"
                alt=""
                hidden>


            <img
                id="player-outer"
                data-player-layer="outer"
                alt=""
                hidden>


            <img
                id="player-gloves"
                data-player-layer="gloves"
                alt=""
                hidden>


            <img
                id="player-head"
                data-player-layer="head"
                alt=""
                hidden>


            <img
                id="player-accessories"
                data-player-layer="accessories"
                alt=""
                hidden>

        </div>


        <button
            id="openWardrobe"
            type="button">
            着せ替える
        </button>


        <button
            id="gotoGuildHall"
            type="button">
            ギルドホールへ
        </button>


        <div
            id="wardrobeOverlay"
            class="wardrobe-overlay"
            hidden
            aria-hidden="true">

            <section
                class="wardrobe-window"
                role="dialog"
                aria-modal="true"
                aria-labelledby="wardrobeTitle">

                <header class="wardrobe-header">

                    <p class="wardrobe-label">
                        WARDROBE
                    </p>

                    <h2 id="wardrobeTitle">
                        着せ替え
                    </h2>

                    <p class="wardrobe-help">
                        購入した服を選んでください
                    </p>

                </header>


                <div
                    id="wardrobeItemList"
                    class="wardrobe-item-list">
                </div>


                <p
                    id="wardrobeStatus"
                    class="wardrobe-status"
                    aria-live="polite">
                </p>


                <button
                    id="closeWardrobe"
                    type="button">
                    閉じる
                </button>

            </section>

        </div>

    </section>



    <!-- ========================= -->
    <!-- ギルドホール -->
    <!-- ========================= -->

    <section
        id="guildhall-screen"
        class="screen"
        aria-hidden="true">

        <div
            class="background guildhall-background">
        </div>


        <div class="guildhall-menu">

            <button
                id="gotoQuestBoard"
                type="button">
                今日のクエスト
            </button>


            <button
                id="gotoGuildShop"
                type="button">
                ギルドショップ
            </button>

        </div>


        <button
            id="backRoom"
            type="button">
            部屋へ戻る
        </button>

    </section>



    <!-- ========================= -->
    <!-- ギルドショップ -->
    <!-- ========================= -->

    <section
        id="guildshop-screen"
        class="screen"
        aria-hidden="true">

        <div
            class="background guildshop-background">
        </div>


        <div class="guildshop-window">

            <header class="guildshop-header">

                <p class="guildshop-label">
                    GUILD SHOP
                </p>

                <h2>
                    ギルドショップ
                </h2>

                <p
                    id="guildShopGpDisplay"
                    class="gp-display">
                    所持GP：0
                </p>

            </header>


            <div
                class="guildshop-tabs"
                role="tablist"
                aria-label="ギルドショップの種類">

                <button
                    type="button"
                    class="guildshop-tab active"
                    data-guildshop-tab="items"
                    role="tab"
                    aria-selected="true">
                    装備・衣装
                </button>

                <button
                    type="button"
                    class="guildshop-tab"
                    data-guildshop-tab="music"
                    role="tab"
                    aria-selected="false">
                    音楽家を招待
                </button>

            </div>


            <div
                id="guildShopItemList"
                class="guildshop-item-list">

                <p class="shop-empty-message">
                    商品を確認しています……
                </p>

            </div>


            <div
                id="guildMusicList"
                class="guildshop-item-list guildmusic-item-list"
                hidden>

                <p class="shop-empty-message">
                    演奏家を確認しています……
                </p>

            </div>

        </div>


        <button
            id="backGuildHallFromShop"
            type="button">
            ギルドホールへ戻る
        </button>

    </section>



    <!-- ========================= -->
    <!-- クエストボード -->
    <!-- ========================= -->

    <section
        id="questboard-screen"
        class="screen"
        aria-hidden="true">

        <div
            class="background guildhall-background">
        </div>


        <div class="questboard-window">

            <header class="questboard-header">

                <p class="questboard-label">
                    DAILY QUEST
                </p>

                <h2>
                    今日のクエスト
                </h2>

                <p
                    id="gpDisplay"
                    class="gp-display">
                    所持GP：0
                </p>

            </header>


            <div
                id="dailyQuestList"
                class="daily-quest-list">

                <p class="quest-loading">
                    クエストを確認しています……
                </p>

            </div>

        </div>


        <button
            id="backGuildHall"
            type="button">
            ギルドホールへ戻る
        </button>

    </section>



    <!-- ========================= -->
    <!-- クエスト実行画面 -->
    <!-- ========================= -->

    <section
        id="quest-screen"
        class="screen"
        aria-hidden="true">

        <div
            class="background quest-background">
        </div>


        <main
            id="questContainer"
            class="quest-container"
            aria-live="polite">
        </main>

    </section>


    <!-- ===== index.html Part 1 ここまで ===== -->
        <!-- ========================= -->
    <!-- クエスト結果画面 -->
    <!-- ========================= -->

    <section
        id="result-screen"
        class="screen"
        aria-hidden="true">

        <div
            class="background result-background">
        </div>


        <div class="result-window">

            <p class="result-label">
                QUEST COMPLETE
            </p>


            <h2 id="resultTitle">
                クエストクリア！
            </h2>


            <div
                id="resultMessage"
                class="result-message"
                aria-live="polite">
                最後まで取り組みました
            </div>


            <div class="reward-panel">

                <span class="reward-label">
                    獲得報酬
                </span>


                <strong id="rewardText">
                    10 GP
                </strong>

            </div>


            <p
                id="totalGpText"
                class="total-gp-text">
                所持GP：10
            </p>


            <button
                id="resultBackQuestBoard"
                type="button">
                クエストボードへ戻る
            </button>

        </div>

    </section>



    <!-- ========================= -->
    <!-- Developer Mode -->
    <!-- ========================= -->

    <aside
        id="developerPanel"
        hidden
        aria-hidden="true">
    </aside>



    <audio
        id="guildMusicAudio"
        preload="metadata"
        playsinline>
    </audio>


    <!-- ========================= -->
    <!-- JavaScript -->
    <!-- 読み込み順が重要 -->
    <!-- ========================= -->

    <script src="js/settings.js?v=20260722-3"></script>

    <script src="data/items/items.js?v=20260722-2"></script>

    <script src="data/shop/music.js?v=20260721-1"></script>

    <script src="js/systems/musicPlayer.js?v=20260721-1"></script>

    <script src="js/systems/questMusicPlayer.js?v=20260721-1"></script>

    <script src="js/screens/shop.js?v=20260721-1"></script>

    <script src="js/screens/musicShop.js?v=20260721-1"></script>

    <script src="js/screens/wardrobe.js?v=20260722-2"></script>

    <script src="js/systems/questEngine.js?v=20260722-3"></script>

    <script src="js/quests/daily.js?v=20260721-1"></script>

    <!-- 共通数字入力パッド -->
    <script src="js/numberpad.js?v=20260721-1"></script>

    <script src="js/quests/hyakumasu.js?v=20260722-3"></script>

    <script src="js/developer.js?v=20260721-1"></script>

    <script src="js/app.js?v=20260722-3"></script>

</body>

</html>
