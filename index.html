<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        夏休みギルド ～自分を定義する冒険～
    </title>


    <!-- ========================= -->
    <!-- CSS -->
    <!-- ========================= -->

    <link
        rel="stylesheet"
        href="css/common.css">

    <link
        rel="stylesheet"
        href="css/layout.css">

    <link
        rel="stylesheet"
        href="css/developer.css">


    <!-- ========================= -->
    <!-- PWA -->
    <!-- ========================= -->

    <link
        rel="manifest"
        href="manifest.webmanifest">

    <meta
        name="theme-color"
        content="#2b1b12">

    <meta
        name="apple-mobile-web-app-capable"
        content="yes">

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black-translucent">

    <meta
        name="apple-mobile-web-app-title"
        content="夏休みギルド">
</head>


<body>

    <!-- ========================= -->
    <!-- タイトル画面 -->
    <!-- ========================= -->

    <section
        id="title-screen"
        class="screen active">

        <div
            class="background title-background">
        </div>


        <div class="title-panel">

            <h1
                id="gameTitle"
                tabindex="-1">
                夏休みギルド
            </h1>


            <p class="subtitle">
                ～ 自分を定義する冒険 ～
            </p>


            <button
                id="startButton"
                type="button">
                はじめる
            </button>

        </div>

    </section>



    <!-- ========================= -->
    <!-- 自分の部屋 -->
    <!-- ========================= -->

    <section
        id="room-screen"
        class="screen"
        aria-hidden="true">

        <div
            class="background room-background">
        </div>


        <!-- 主人公 -->

        <div id="player">

            <img
                id="player-base"
                src="assets/characters/player/base/base.png"
                alt="主人公">


            <img
                id="player-top"
                src="assets/characters/player/clothes/tops/default_tops.png"
                alt="">


            <img
                id="player-bottom"
                src="assets/characters/player/clothes/bottoms/default_bottoms.png"
                alt="">

        </div>


        <button
            id="gotoGuildHall"
            type="button">
            ギルドホールへ
        </button>

    </section>



    <!-- ========================= -->
    <!-- ギルドホール -->
    <!-- ========================= -->

    <section
        id="guildhall-screen"
        class="screen"
        aria-hidden="true">

        <div
            class="background guildhall-background">
        </div>


        <button
            id="backRoom"
            type="button">
            部屋へ戻る
        </button>

    </section>



    <!-- ========================= -->
    <!-- Developer Mode -->
    <!-- 通常は完全非表示 -->
    <!-- ========================= -->

    <aside
        id="developerPanel"
        hidden
        aria-hidden="true">
    </aside>



    <!-- ========================= -->
    <!-- JavaScript -->
    <!-- 読み込み順が重要 -->
    <!-- ========================= -->

    <script src="js/settings.js"></script>

    <script src="js/developer.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
